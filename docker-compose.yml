services:
  postgres:
    image: postgres:17
    container_name: finclaw-postgres
    restart: unless-stopped
    env_file:
      - .env.postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - /Volumes/ExtSSD/prj/finClaw/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pgadmin:
    image: dpage/pgadmin4
    container_name: finclaw-pgadmin
    restart: unless-stopped
    env_file:
      - .env.pgadmin
    ports:
      - "127.0.0.1:5050:80"
    volumes:
      - /Volumes/ExtSSD/prj/finClaw/data/pgadmin:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
