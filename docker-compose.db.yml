name: finclaw-db

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    env_file:
      - .env.postgres
    ports:
      - "0.0.0.0:5123:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  adminer:
    image: adminer
    restart: unless-stopped
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    ports:
      - "0.0.0.0:5124:8080"
    networks:
      - db_net
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

networks:
  db_net:
